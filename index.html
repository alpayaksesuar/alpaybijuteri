<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Alpay Bijuteri">
<meta name="theme-color" content="#1a1a1a">
<title>Alpay Bijuteri</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #1a1a1a;
    --white: #fafafa;
    --gray: #888;
    --light: #f0eeeb;
    --gold: #b8860b;
    --border: #e0ddd8;
  }

  body {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-img {
    height: 80px;
    width: auto;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-btn, .cart-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: var(--black);
    padding: 4px;
    position: relative;
  }

  .cart-count {
    position: absolute;
    top: -4px;
    right: -6px;
    background: var(--gold);
    color: white;
    font-size: 10px;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    border-radius: 50%;
    width: 17px;
    height: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }

  /* SEARCH BAR */
  .search-bar {
    display: none;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }

  .search-bar.active { display: block; }

  .search-bar input {
    width: 100%;
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 14px;
    outline: none;
    background: var(--light);
    color: var(--black);
  }

  /* CATEGORIES */
  .categories {
    display: flex;
    overflow-x: auto;
    gap: 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
    background: var(--white);
  }

  .categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    padding: 10px 16px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .cat-btn.active {
    color: var(--black);
    border-bottom-color: var(--gold);
  }

  /* PRODUCT GRID */
  .products-container {
    padding: 16px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 16px;
    font-weight: 300;
    font-style: italic;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
  }

  @media (min-width: 600px) {
    .product-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .product-card {
    background: var(--white);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .product-card:hover .product-overlay {
    opacity: 1;
  }

  .product-img-wrap {
    position: relative;
    aspect-ratio: 1;
    background: var(--light);
    overflow: hidden;
  }

  .product-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .product-card:hover .product-img-wrap img {
    transform: scale(1.04);
  }

  .product-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,26,26,0.15);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .add-btn-overlay {
    background: var(--white);
    color: var(--black);
    border: none;
    padding: 8px 14px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 400;
  }

  .product-info {
    padding: 8px 4px 12px;
  }

  .product-name {
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--black);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .product-cat {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
    font-size: 13px;
    letter-spacing: 1px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 1px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* CART SIDEBAR */
  .cart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }

  .cart-overlay.active { display: block; }

  .cart-sidebar {
    position: fixed;
    top: 0;
    right: -100%;
    width: min(380px, 100vw);
    height: 100%;
    background: var(--white);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .cart-sidebar.active { right: 0; }

  .cart-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cart-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .close-cart {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--gray);
    line-height: 1;
  }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .cart-empty {
    text-align: center;
    color: var(--gray);
    font-size: 13px;
    letter-spacing: 0.5px;
    margin-top: 40px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
  }

  .cart-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }

  .cart-item-img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    background: var(--light);
    flex-shrink: 0;
  }

  .cart-item-info { flex: 1; min-width: 0; }

  .cart-item-name {
    font-size: 13px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cart-item-cat {
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .qty-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--black);
  }

  .qty-num { font-size: 13px; min-width: 20px; text-align: center; }

  .qty-input {
    width: 44px;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--light);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--black);
    padding: 2px 4px;
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-inner-spin-button,
  .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .remove-item {
    background: none;
    border: none;
    color: var(--gray);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 2px;
  }

  /* CART BOTTOM */
  .cart-bottom {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  .cart-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .cart-form input, .cart-form textarea {
    border: 1px solid var(--border);
    padding: 10px 12px;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 13px;
    outline: none;
    background: var(--light);
    color: var(--black);
    resize: none;
  }

  .cart-form textarea { height: 60px; }

  .wa-btn {
    width: 100%;
    background: #25D366;
    color: white;
    border: none;
    padding: 14px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 400;
  }

  .wa-btn:disabled {
    background: var(--border);
    color: var(--gray);
    cursor: not-allowed;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
  }

  .lightbox-name {
    color: white;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    margin-top: 16px;
    font-style: italic;
  }

  .lightbox-cat {
    color: var(--gray);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
  }

  .lightbox-add {
    margin-top: 20px;
    background: var(--white);
    color: var(--black);
    border: none;
    padding: 12px 32px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 400;
  }

  /* ERROR */
  .error-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray);
    font-size: 13px;
  }

  /* INSTALL BANNER */
  .install-banner {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--black);
    color: var(--white);
    padding: 14px 20px;
    z-index: 150;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .install-banner.active { display: flex; }

  .install-text { font-size: 12px; letter-spacing: 0.5px; flex: 1; }

  .install-btn {
    background: var(--gold);
    color: white;
    border: none;
    padding: 8px 16px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
  }

  .install-close {
    background: none;
    border: none;
    color: var(--gray);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
</style>
</head>

  const url = `https://www.googleapis.com/drive/v3/files?q='${parentId}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name)&key=${API_KEY}&orderBy=name`;
  const res = await fetch(url);
  const data = await res.json();
  return data.files || [];
}

async function fetchImages(folderId) {
  const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'+and+trashed=false&fields=files(id,name,thumbnailLink)&key=${API_KEY}&pageSize=200`;
  const res = await fetch(url);
  const data = await res.json();
  return data.files || [];
}

function driveThumb(fileId, size = 400) {
  return `https://lh3.googleusercontent.com/d/${fileId}=w${size}`;
}

async function loadDrive() {
  try {
    const topFolders = await fetchFolders(ROOT_FOLDER_ID);

    if (topFolders.length === 0) {
      document.getElementById('productGrid').innerHTML = '<div class="error-msg">Drive klasöründe kategori bulunamadı.</div>';
      return;
    }

    let products = [];

    async function processFolder(folderId, category, subCategory, depth) {
      if (depth > 3) return;
      const subFolders = await fetchFolders(folderId);
      if (subFolders.length > 0) {
        for (const sub of subFolders) {
          await processFolder(sub.id, category, sub.name, depth + 1);
        }
      } else {
        const imgs = await fetchImages(folderId);
        imgs.forEach(img => {
          products.push({
            id: img.id,
            name: img.name.replace(/\.\w+$/, '').replace(/[-_]/g, ' '),
            category,
            subCategory,
            thumb: driveThumb(img.id, 400),
            full: driveThumb(img.id, 800),
          });
        });
      }
    }

    for (const folder of topFolders) {
      await processFolder(folder.id, folder.name, null, 1);
    }

    allProducts = products;
    buildCategoryTabs();
    renderProducts('Tümü');
  } catch (e) {
    document.getElementById('productGrid').innerHTML = `<div class="error-msg">Ürünler yüklenemedi. API anahtarını kontrol edin.<br><small>${e.message}</small></div>`;
  }
}

// --- CATEGORIES ---
function buildCategoryTabs() {
  const cats = ['Tümü', ...new Set(allProducts.map(p => p.category))];
  const container = document.getElementById('catTabs');
  container.innerHTML = cats.map(c =>
    `<button class="cat-btn ${c === 'Tümü' ? 'active' : ''}" onclick="selectCategory('${c}')">${c}</button>`
  ).join('');
}

function selectCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  [...document.querySelectorAll('.cat-btn')].find(b => b.textContent === cat)?.classList.add('active');
  renderProducts(cat);
  document.getElementById('searchInput').value = '';
}

// --- RENDER ---
function renderProducts(cat) {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let products = cat === 'Tümü' ? allProducts : allProducts.filter(p => p.category === cat);
  if (search) products = products.filter(p => p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search));

  const title = cat === 'Tümü' ? `Tüm Ürünler (${products.length})` : `${cat} — ${products.length} ürün`;
  document.getElementById('sectionTitle').textContent = title;

  if (products.length === 0) {
    document.getElementById('productGrid').innerHTML = '<div class="loading">Ürün bulunamadı</div>';
    return;
  }

  document.getElementById('productGrid').innerHTML = products.map(p => `
    <div class="product-card" onclick="openLightbox('${p.id}')">
      <div class="product-img-wrap">
        <img src="${p.thumb}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23f0eeeb%22 width=%22400%22 height=%22400%22/%3E%3C/svg%3E'">
        <div class="product-overlay">
          <button class="add-btn-overlay" onclick="event.stopPropagation(); addToCart('${p.id}')">Sepete Ekle</button>
        </div>
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-cat">${p.subCategory || p.category}</div>
      </div>
    </div>
  `).join('');
}

function filterProducts() {
  renderProducts(currentCategory);
}

// --- SEARCH ---
function toggleSearch() {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('active');
  if (bar.classList.contains('active')) {
    document.getElementById('searchInput').focus();
  }
}

// --- LIGHTBOX ---
function openLightbox(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  currentLbProduct = p;
  document.getElementById('lbImg').src = p.full;
  document.getElementById('lbName').textContent = p.name;
  document.getElementById('lbCat').textContent = p.subCategory || p.category;
  document.getElementById('lbAddBtn').onclick = () => { addToCart(id); closeLightbox(); };
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(e) {
  if (e && (e.target === document.getElementById('lbImg') || e.target === document.getElementById('lbAddBtn'))) return;
  document.getElementById('lightbox').classList.remove('active');
}

// --- CART ---
function addToCart(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const existing = cart.find(c => c.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartUI();
  openCart();
}

function updateCartUI() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  const countEl = document.getElementById('cartCount');
  countEl.textContent = total;
  countEl.style.display = total > 0 ? 'flex' : 'none';

  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty">Sepetiniz boş</div>';
    return;
  }

  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img class="cart-item-img" src="${item.thumb}" alt="${item.name}" onclick="openLightbox('${item.id}')" style="cursor:pointer;">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-cat">${item.subCategory || item.category}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
          <input type="number" class="qty-input" value="${item.qty}" min="1"
            onchange="setQty('${item.id}', parseInt(this.value))"
            onclick="this.select()">
          <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
        </div>
      </div>
      <button class="remove-item" onclick="removeItem('${item.id}')">×</button>
    </div>
  `).join('');
}

function setQty(id, val) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  if (!val || val < 1) { removeItem(id); return; }
  item.qty = val;
  updateCartUI();
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeItem(id);
  else updateCartUI();
}

function removeItem(id) {
  cart = cart.filter(c => c.id !== id);
  updateCartUI();
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('active');
  document.getElementById('cartSidebar').classList.add('active');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('active');
  document.getElementById('cartSidebar').classList.remove('active');
}

// --- WHATSAPP ---
function sendWhatsApp() {
  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  if (!name || !phone) { alert('Lütfen isim ve telefon numaranızı girin.'); return; }
  if (cart.length === 0) { alert('Sepetiniz boş.'); return; }

  const orderNo = Math.random().toString(36).slice(2,7).toUpperCase();
  const note = document.getElementById('noteInput').value.trim();
  const now = new Date();
  const dateStr = now.toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

  // Sipariş verilerini URL'e kodla
  const orderData = {
    no: orderNo,
    name,
    phone,
    note,
    date: dateStr,
    items: cart.map(item => ({
      id: item.id,
      name: item.name,
      cat: item.subCategory || item.category,
      qty: item.qty
    }))
  };
  const orderParam = btoa(unescape(encodeURIComponent(JSON.stringify(orderData))));
  const orderLink = `${window.location.origin}${window.location.pathname}?siparis=${orderParam}`;

  let msg = `🛍 *YENİ SİPARİŞ — ${orderNo}*\n\n`;
  msg += `👤 *${name}*\n📞 ${phone}\n\n`;
  msg += `*Ürünler:*\n`;
  cart.forEach((item, i) => {
    msg += `\n${i+1}. *${item.name}* (x${item.qty})\n`;
    msg += `   📂 ${item.subCategory || item.category}\n`;
  });
  if (note) msg += `\n📝 *Not:* ${note}`;
  msg += `\n\n📋 *Sipariş Detayı (Görsel):*\n${orderLink}`;

  const encoded = encodeURIComponent(msg);
  window.open(`https://wa.me/${WA_NUMBER}?text=${encoded}`, '_blank');
}

// --- PWA INSTALL ---
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('active');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissInstall();
});

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('active');
}

// --- SİPARİŞ SAYFASI KONTROLÜ ---
function checkOrderPage() {
  const params = new URLSearchParams(window.location.search);
  const orderParam = params.get('siparis');
  if (!orderParam) return;

  try {
    const orderData = JSON.parse(decodeURIComponent(escape(atob(orderParam))));
    showOrderPage(orderData);
  } catch(e) {
    console.error('Sipariş verisi okunamadı', e);
  }
}
