<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alpay Bijuteri">
<meta name="theme-color" content="#1a1a1a">
<title>Alpay Bijuteri</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --black:#1a1a1a; --white:#fafafa; --gray:#888; --light:#f0eeeb; --gold:#b8860b; --border:#e0ddd8; }
body { font-family:'Jost',sans-serif; font-weight:300; background:var(--white); color:var(--black); min-height:100vh; }

header { position:sticky; top:0; z-index:100; background:var(--white); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
.logo-img { height:80px; width:auto; }
.header-right { display:flex; align-items:center; gap:12px; }
.search-btn, .cart-btn { background:none; border:none; cursor:pointer; font-size:20px; color:var(--black); padding:4px; position:relative; }
.cart-count { position:absolute; top:-4px; right:-6px; background:var(--gold); color:white; font-size:10px; border-radius:50%; width:17px; height:17px; display:none; align-items:center; justify-content:center; }

.search-bar { display:none; padding:8px 16px; border-bottom:1px solid var(--border); }
.search-bar.active { display:block; }
.search-bar input { width:100%; border:1px solid var(--border); padding:8px 12px; font-family:'Jost',sans-serif; font-size:14px; outline:none; background:var(--light); }

.cat-row { display:flex; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--border); }
.cat-row::-webkit-scrollbar { display:none; }
.sub-row { display:none; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--border); background:var(--light); }
.sub-row.active { display:flex; }
.sub-row::-webkit-scrollbar { display:none; }
.cat-btn { flex-shrink:0; padding:10px 16px; border:none; background:none; cursor:pointer; font-family:'Jost',sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.2s; }
.cat-btn.active { color:var(--black); border-bottom-color:var(--gold); }
.sub-btn { flex-shrink:0; padding:8px 14px; border:none; background:none; cursor:pointer; font-family:'Jost',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gray); border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.2s; }
.sub-btn.active { color:var(--black); border-bottom-color:var(--gold); }

.products-container { padding:16px; }
.section-title { font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--gray); margin-bottom:16px; font-style:italic; }
.product-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:2px; }
@media(min-width:600px){ .product-grid { grid-template-columns:repeat(3,1fr); } }

.product-card { background:var(--white); cursor:pointer; position:relative; }
.product-img-wrap { position:relative; aspect-ratio:1; background:var(--light); overflow:hidden; }
.product-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; }
.product-card:hover .product-img-wrap img { transform:scale(1.04); }
.add-to-cart-btn { position:absolute; bottom:0; left:0; right:0; background:rgba(26,26,26,0.85); color:white; border:none; padding:10px; font-family:'Jost',sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; opacity:0; transition:opacity 0.2s; }
.product-card:hover .add-to-cart-btn { opacity:1; }
@media(hover:none){ .add-to-cart-btn { opacity:1; } }
.product-info { padding:8px 4px 12px; }
.product-name { font-size:12px; color:var(--black); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.product-cat { font-size:10px; color:var(--gray); text-transform:uppercase; letter-spacing:0.5px; }

.loading { text-align:center; padding:60px 20px; color:var(--gray); font-size:13px; }
.spinner { width:24px; height:24px; border:1px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }

.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:300; align-items:center; justify-content:center; flex-direction:column; }
.lightbox.active { display:flex; }
.lightbox img { max-width:90vw; max-height:75vh; object-fit:contain; }
.lightbox-name { color:white; font-family:'Cormorant Garamond',serif; font-size:18px; margin-top:16px; font-style:italic; }
.lightbox-cat { color:var(--gray); font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
.lightbox-close { position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:28px; cursor:pointer; }
.lightbox-add { margin-top:20px; background:var(--white); color:var(--black); border:none; padding:12px 32px; font-family:'Jost',sans-serif; font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; }

.cart-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; }
.cart-overlay.active { display:block; }
.cart-sidebar { position:fixed; top:0; right:-100%; width:min(380px,100vw); height:100%; background:var(--white); z-index:201; display:flex; flex-direction:column; transition:right 0.35s; }
.cart-sidebar.active { right:0; }
.cart-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.cart-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300; }
.close-cart { background:none; border:none; font-size:22px; cursor:pointer; color:var(--gray); }
.cart-items { flex:1; overflow-y:auto; padding:16px 20px; }
.cart-empty { text-align:center; color:var(--gray); font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; margin-top:40px; }
.cart-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
.cart-item-img { width:64px; height:64px; object-fit:cover; flex-shrink:0; cursor:pointer; }
.cart-item-info { flex:1; min-width:0; }
.cart-item-name { font-size:13px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cart-item-cat { font-size:11px; color:var(--gray); text-transform:uppercase; margin-bottom:8px; }
.cart-item-qty { display:flex; align-items:center; gap:8px; }
.qty-btn { width:24px; height:24px; border:1px solid var(--border); background:none; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.qty-input { width:44px; text-align:center; border:1px solid var(--border); background:var(--light); font-family:'Jost',sans-serif; font-size:13px; padding:2px 4px; -moz-appearance:textfield; }
.qty-input::-webkit-inner-spin-button, .qty-input::-webkit-outer-spin-button { -webkit-appearance:none; }
.remove-item { background:none; border:none; color:var(--gray); cursor:pointer; font-size:18px; }
.cart-bottom { padding:16px 20px; border-top:1px solid var(--border); }
.cart-form { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
.cart-form input, .cart-form textarea { border:1px solid var(--border); padding:10px 12px; font-family:'Jost',sans-serif; font-size:13px; outline:none; background:var(--light); resize:none; }
.cart-form textarea { height:60px; }
.wa-btn { width:100%; background:#25D366; color:white; border:none; padding:14px; font-family:'Jost',sans-serif; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }

/* SİPARİŞ SAYFASI */
.order-page { display:none; min-height:100vh; }
.order-page.active { display:block; }
.op-header { background:var(--black); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
.op-logo { height:52px; }
.op-no { color:var(--gold); font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; }
.op-info { background:var(--light); padding:16px 20px; display:flex; flex-wrap:wrap; gap:20px; border-bottom:1px solid var(--border); }
.op-info-item label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); display:block; margin-bottom:3px; }
.op-info-item span { font-size:14px; }
.op-section-title { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); padding:16px 20px 10px; border-bottom:1px solid var(--border); }
.op-item { display:flex; gap:16px; padding:16px 20px; border-bottom:1px solid var(--light); align-items:center; background:white; }
.op-item img { width:110px; height:110px; object-fit:cover; border:1px solid var(--border); flex-shrink:0; }
.op-item-info { flex:1; }
.op-item-name { font-size:15px; margin-bottom:6px; font-weight:400; }
.op-item-cat { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gray); margin-bottom:8px; }
.op-item-link a { font-size:11px; color:var(--gold); text-decoration:none; }
.op-item-qty { font-size:32px; font-family:'Cormorant Garamond',serif; min-width:52px; text-align:center; flex-shrink:0; color:var(--black); background:var(--light); padding:8px; border:1px solid var(--border); }
.op-footer { padding:16px 20px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.op-note { margin:0 20px 16px; padding:14px 16px; border:1px solid var(--border); }
.op-note-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gray); margin-bottom:6px; }
.op-btn { display:block; margin:16px 20px 8px; background:var(--black); color:white; border:none; padding:13px; font-family:'Jost',sans-serif; font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; width:calc(100% - 40px); text-align:center; }
.op-btn-gray { background:var(--gray); margin-top:0; margin-bottom:24px; }
.op-loading { text-align:center; padding:40px 20px; color:var(--gray); font-size:13px; }

.install-banner { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--black); color:var(--white); padding:14px 20px; z-index:150; align-items:center; gap:12px; }
.install-banner.active { display:flex; }
.install-btn { background:var(--gold); color:white; border:none; padding:8px 16px; font-family:'Jost',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; white-space:nowrap; }
.install-close { background:none; border:none; color:var(--gray); font-size:18px; cursor:pointer; margin-left:auto; }

/* RENK SEÇİMİ */
.color-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:400; }
.color-overlay.active { display:block; }
.color-modal { position:fixed; bottom:-100%; left:0; right:0; background:var(--white); z-index:401; padding:24px 20px 32px; border-radius:12px 12px 0 0; transition:bottom 0.3s; }
.color-modal.active { bottom:0; }
.color-modal-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-style:italic; margin-bottom:4px; }
.color-modal-sub { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--gray); margin-bottom:20px; }
.color-options { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
.color-opt { padding:8px 16px; border:1px solid var(--border); background:none; font-family:'Jost',sans-serif; font-size:12px; cursor:pointer; transition:all 0.15s; }
.color-opt.selected { border-color:var(--black); background:var(--black); color:white; }
.color-confirm { width:100%; background:var(--black); color:white; border:none; padding:14px; font-family:'Jost',sans-serif; font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; }
.color-confirm:disabled { background:var(--border); color:var(--gray); cursor:not-allowed; }

@media print {
  header,.search-bar,.cat-row,.sub-row,.products-container,.lightbox,.cart-overlay,.cart-sidebar,.install-banner,.op-btn,.no-print { display:none!important; }
  .order-page { display:block!important; }
  .op-header { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  @page { margin:0.5cm; }
}
</style>
</head>

const SITE_URL = 'https://alpaybijuteritoptan.vercel.app';

let allProducts = [], cart = [], currentLbId = null;
let currentCategory = 'Tümü', currentSubCategory = null;
let deferredPrompt = null;

// --- SİPARİŞ SAYFASI ---
// URL formatı: ?s=NO|AD|TEL|NOT|ID1:QTY1,ID2:QTY2,...
// Çok kısa — sadece Drive ID'leri ve adetler

function checkOrderPage() {
  const param = new URLSearchParams(window.location.search).get('s');
  if (!param) return false;
  try {
    const parts = param.split('|');
    const no = parts[0];
    const name = decodeURIComponent(parts[1] || '');
    const phone = decodeURIComponent(parts[2] || '');
    const note = decodeURIComponent(parts[3] || '');
    const itemsRaw = (parts[4] || '').split(',').filter(Boolean);
    const items = itemsRaw.map(x => {
      const [id, qty] = x.split(':');
      return { id, qty: parseInt(qty) || 1 };
    });
    showOrderPage({ no, name, phone, note, items });
    return true;
  } catch(e) { return false; }
}

async function showOrderPage(order) {
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('orderPage').classList.add('active');
  document.getElementById('opNo').textContent = `Sipariş #${order.no}`;
  const totalQty = order.items.reduce((s,i) => s + i.qty, 0);
  document.getElementById('opInfo').innerHTML = `
    <div class="op-info-item"><label>Müşteri</label><span>${order.name}</span></div>
    <div class="op-info-item"><label>Telefon</label><span>${order.phone}</span></div>
    <div class="op-info-item"><label>Toplam</label><span>${totalQty} ürün</span></div>
  `;
  document.getElementById('opTotal').textContent = `${totalQty} ürün`;
  if (order.note) {
    document.getElementById('opNote').innerHTML = `
      <div class="op-note">
        <div class="op-note-label">Not</div>
        <div style="font-size:13px;">${order.note}</div>
      </div>`;
  }

  // Drive'dan ürün bilgilerini çek
  // Önce allProducts yükle, yoksa Drive'dan tek tek çek
  const itemsHTML = await Promise.all(order.items.map(async (item, i) => {
    // Drive'dan dosya bilgisi çek
    let name = item.id;
    try {
      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${item.id}?fields=name&key=${API_KEY}`);
      const d = await r.json();
      name = (d.name || item.id).replace(/\.\w+$/, '').replace(/[-_]/g, ' ');
    } catch(e) {}

    return `
      <div class="op-item">
        <img src="https://lh3.googleusercontent.com/d/${item.id}=w200"
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23f0eeeb%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'"
             alt="${name}">
        <div class="op-item-info">
          <div class="op-item-name">${name}</div>
          <div class="op-item-link"><a href="https://drive.google.com/file/d/${item.id}/view" target="_blank">Drive'da Görüntüle →</a></div>
        </div>
        <div class="op-item-qty">×${item.qty}</div>
      </div>
    `;
  }));

  document.getElementById('opItems').innerHTML = itemsHTML.join('');
}

function goBack() {
  window.history.pushState({}, '', window.location.pathname);
  document.getElementById('orderPage').classList.remove('active');
  document.getElementById('mainPage').style.display = 'block';
}

// --- DRIVE ---
async function fetchFolders(id) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name)&key=${API_KEY}&orderBy=name`);
  return (await r.json()).files || [];
}
async function fetchImages(id) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents+and+mimeType+contains+'image/'+and+trashed=false&fields=files(id,name)&key=${API_KEY}&pageSize=200`);
  return (await r.json()).files || [];
}
function thumb(id, w=400) { return `https://lh3.googleusercontent.com/d/${id}=w${w}`; }

const CACHE_KEY = 'alpay_products_v1';
const CACHE_TTL = 24 * 60 * 60 * 1000;

async function loadDrive() {
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const { data, ts } = JSON.parse(cached);
      if (Date.now() - ts < CACHE_TTL && data.length) {
        allProducts = data;
        buildCats();
        renderProducts();
        fetchFromDrive(true);
        return;
      }
    }
  } catch(e) {}
  await fetchFromDrive(false);
}

async function fetchFromDrive(silent) {
  try {
    const topFolders = await fetchFolders(ROOT_FOLDER_ID);
    if (!topFolders.length) { if(!silent) document.getElementById('productGrid').innerHTML='<div class="loading">Klasör bulunamadı.</div>'; return; }
    const results = await Promise.all(topFolders.map(async folder => {
      const subs = await fetchFolders(folder.id);
      if (subs.length) {
        const sr = await Promise.all(subs.map(async sub => {
          const imgs = await fetchImages(sub.id);
          return imgs.map(img => ({ id:img.id, name:img.name.replace(/\.\w+$/,''), category:folder.name, subCategory:sub.name, thumb:thumb(img.id), full:thumb(img.id,800) }));
        }));
        return sr.flat();
      } else {
        const imgs = await fetchImages(folder.id);
        return imgs.map(img => ({ id:img.id, name:img.name.replace(/\.\w+$/,''), category:folder.name, subCategory:null, thumb:thumb(img.id), full:thumb(img.id,800) }));
      }
    }));
    allProducts = results.flat();
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ data: allProducts, ts: Date.now() })); } catch(e) {}
    if (!silent) { buildCats(); renderProducts(); }
  } catch(e) {
    if (!silent) document.getElementById('productGrid').innerHTML = `<div class="loading">Yüklenemedi: ${e.message}</div>`;
  }
}

// --- KATEGORİLER ---
function buildCats() {
  const cats = ['Tümü', ...new Set(allProducts.map(p=>p.category))];
  document.getElementById('catTabs').innerHTML = cats.map(c =>
    `<button class="cat-btn ${c==='Tümü'?'active':''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}
function buildSubCats(cat) {
  const el = document.getElementById('subTabs');
  if (cat==='Tümü') { el.classList.remove('active'); el.innerHTML=''; return; }
  const subs = [...new Set(allProducts.filter(p=>p.category===cat&&p.subCategory).map(p=>p.subCategory))];
  if (!subs.length) { el.classList.remove('active'); el.innerHTML=''; return; }
  el.innerHTML = ['Tümü',...subs].map(s =>
    `<button class="sub-btn ${s==='Tümü'?'active':''}" onclick="selectSub('${s}')">${s}</button>`
  ).join('');
  el.classList.add('active');
}
function selectCat(cat) {
  currentCategory=cat; currentSubCategory=null;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  [...document.querySelectorAll('.cat-btn')].find(b=>b.textContent===cat)?.classList.add('active');
  buildSubCats(cat);
  document.getElementById('searchInput').value='';
  renderProducts();
}
function selectSub(sub) {
  currentSubCategory = sub==='Tümü'?null:sub;
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  [...document.querySelectorAll('.sub-btn')].find(b=>b.textContent===sub)?.classList.add('active');
  renderProducts();
}

// --- RENDER ---
function renderProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let list = currentCategory==='Tümü' ? allProducts : allProducts.filter(p=>p.category===currentCategory);
  if (currentSubCategory) list = list.filter(p=>p.subCategory===currentSubCategory);
  if (search) list = list.filter(p=>p.name.toLowerCase().includes(search)||p.category.toLowerCase().includes(search));
  const label = currentSubCategory||(currentCategory==='Tümü'?'Tüm Ürünler':currentCategory);
  document.getElementById('sectionTitle').textContent = `${label} — ${list.length} ürün`;
  if (!list.length) { document.getElementById('productGrid').innerHTML='<div class="loading">Ürün bulunamadı</div>'; return; }
  document.getElementById('productGrid').innerHTML = list.map(p => `
    <div class="product-card" onclick="openLightbox('${p.id}')">
      <div class="product-img-wrap">
        <img src="${p.thumb}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23f0eeeb%22 width=%22400%22 height=%22400%22/%3E%3C/svg%3E'">
        <button class="add-to-cart-btn" onclick="event.stopPropagation();addToCart('${p.id}')">+ Sepete Ekle</button>
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-cat">${p.subCategory||p.category}</div>
      </div>
    </div>
  `).join('');
}
function filterProducts() { renderProducts(); }
function toggleSearch() { const b=document.getElementById('searchBar'); b.classList.toggle('active'); if(b.classList.contains('active')) document.getElementById('searchInput').focus(); }

// --- LIGHTBOX ---
function openLightbox(id) {
  const p=allProducts.find(x=>x.id===id); if(!p) return;
  currentLbId=id;
  document.getElementById('lbImg').src=p.full;
  document.getElementById('lbName').textContent=p.name;
  document.getElementById('lbCat').textContent=p.subCategory||p.category;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
function closeLightboxBg(e) { if(e.target===document.getElementById('lightbox')) closeLightbox(); }
function lbAdd() { if(currentLbId) { addToCart(currentLbId); closeLightbox(); } }

// --- RENK SEÇİMİ ---
let pendingProductId = null;
let selectedColor = null;

function parseColors(name) {
  // "65TL PRT602000007-Kırmızı-Siyah-Pembe" -> ["Kırmızı","Siyah","Pembe"]
  const parts = name.split('-');
  if (parts.length < 2) return [];
  return parts.slice(1).map(c => c.trim()).filter(Boolean);
}

function cleanName(name) {
  // Renkler ve alt çizgi temizlenmiş ürün adı
  return name.split('-')[0].trim().replace(/_/g, ' ');
}

function openColorModal(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const colors = parseColors(p.name);
  if (!colors.length) { addToCartDirect(id, null); return; }

  pendingProductId = id;
  selectedColor = null;

  document.getElementById('colorModalTitle').textContent = cleanName(p.name);
  document.getElementById('colorConfirm').disabled = true;
  document.getElementById('colorOptions').innerHTML = colors.map(c =>
    `<button class="color-opt" onclick="selectColor('${c}', this)">${c}</button>`
  ).join('');

  document.getElementById('colorOverlay').classList.add('active');
  document.getElementById('colorModal').classList.add('active');
}

function selectColor(color, btn) {
  selectedColor = color;
  document.querySelectorAll('.color-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('colorConfirm').disabled = false;
}

function confirmColor() {
  if (!pendingProductId) return;
  addToCartDirect(pendingProductId, selectedColor);
  closeColorModal();
}

function closeColorModal() {
  document.getElementById('colorOverlay').classList.remove('active');
  document.getElementById('colorModal').classList.remove('active');
  pendingProductId = null;
  selectedColor = null;
}

// --- CART ---
function addToCart(id) {
  openColorModal(id);
}

function addToCartDirect(id, color) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const displayName = color ? `${cleanName(p.name)} — ${color}` : cleanName(p.name);
  const cartId = color ? `${id}_${color}` : id;
  const ex = cart.find(c => c.cartId === cartId);
  if (ex) ex.qty++;
  else cart.push({ ...p, cartId, name: displayName, color, qty: 1 });
  updateCartUI();
  openCart();
}
function updateCartUI() {
  const total=cart.reduce((s,c)=>s+c.qty,0);
  const cnt=document.getElementById('cartCount');
  cnt.textContent=total; cnt.style.display=total>0?'flex':'none';
  const el=document.getElementById('cartItems');
  if(!cart.length){el.innerHTML='<div class="cart-empty">Sepetiniz boş</div>';return;}
  el.innerHTML=cart.map(item=>`
    <div class="cart-item">
      <img class="cart-item-img" src="${item.thumb}" alt="${item.name}" onclick="openLightbox('${item.id}')">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-cat">${item.subCategory||item.category}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty('${item.cartId}',-1)">−</button>
          <input type="number" class="qty-input" value="${item.qty}" min="1" onchange="setQty('${item.cartId}',parseInt(this.value))" onclick="this.select()">
          <button class="qty-btn" onclick="changeQty('${item.cartId}',1)">+</button>
        </div>
      </div>
      <button class="remove-item" onclick="removeItem('${item.cartId}')">×</button>
    </div>
  `).join('');
}
function setQty(cartId,val){const item=cart.find(c=>c.cartId===cartId);if(!item)return;if(!val||val<1)removeItem(cartId);else{item.qty=val;updateCartUI();}}
function changeQty(cartId,delta){const item=cart.find(c=>c.cartId===cartId);if(!item)return;item.qty+=delta;if(item.qty<=0)removeItem(cartId);else updateCartUI();}
function removeItem(cartId){cart=cart.filter(c=>c.cartId!==cartId);updateCartUI();}
function openCart(){document.getElementById('cartOverlay').classList.add('active');document.getElementById('cartSidebar').classList.add('active');}
function closeCart(){document.getElementById('cartOverlay').classList.remove('active');document.getElementById('cartSidebar').classList.remove('active');}

// --- WHATSAPP ---
async function sendWhatsApp() {
  const name=document.getElementById('nameInput').value.trim();
  const phone=document.getElementById('phoneInput').value.trim();
  if(!name||!phone){alert('Lütfen isim ve telefon numaranızı girin.');return;}
  if(!cart.length){alert('Sepetiniz boş.');return;}

  // Butonu devre dışı bırak
  const btn = document.querySelector('.wa-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Hazırlanıyor...';

  const orderNo=Math.random().toString(36).slice(2,7).toUpperCase();
  const note=document.getElementById('noteInput').value.trim();
  const totalQty=cart.reduce((s,c)=>s+c.qty,0);

  // Sipariş URL'i oluştur
  const itemsParam = cart.map(item=>`${item.id}:${item.qty}`).join(',');
  const longUrl = `${SITE_URL}/?s=${orderNo}|${encodeURIComponent(name)}|${encodeURIComponent(phone)}|${encodeURIComponent(note)}|${itemsParam}`;

  // TinyURL ile kısalt
  let orderLink = longUrl;
  try {
    const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
    if (res.ok) {
      const short = await res.text();
      if (short.startsWith('http')) orderLink = short;
    }
  } catch(e) {}

  // WhatsApp mesajı
  let msg = `🛍 *YENİ SİPARİŞ — ${orderNo}*\n\n`;
  msg += `👤 *${name}*\n📞 ${phone}\n\n`;
  msg += `*Ürünler (${totalQty} kalem):*\n`;
  cart.forEach((item,i) => {
    msg += `\n${i+1}. *${item.name}* x${item.qty}\n`;
    msg += `   📂 ${item.subCategory||item.category}\n`;
    msg += `   🖼 https://drive.google.com/file/d/${item.id}/view\n`;
  });
  if(note) msg += `\n📝 ${note}`;
  msg += `\n\n📋 *Görselli sipariş:* ${orderLink}`;

  btn.disabled = false;
  btn.innerHTML = '💬 WhatsApp ile Sipariş Ver';

  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');

  // Sepeti temizle
  cart = [];
  updateCartUI();
  document.getElementById('nameInput').value = '';
  document.getElementById('phoneInput').value = '';
  document.getElementById('noteInput').value = '';
  closeCart();
}

// --- PWA ---
window.addEventListener('beforeinstallprompt', e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').classList.add('active');});
document.getElementById('installBtn').addEventListener('click', async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;dismissInstall();});
function dismissInstall(){document.getElementById('installBanner').classList.remove('active');}

// --- INIT ---
if (!checkOrderPage()) loadDrive();
</script>
